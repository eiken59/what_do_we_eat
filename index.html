<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>要吃什麼</title>

<!-- 加到主畫面時盡量表現得像原生 App -->
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-title" content="要吃什麼" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<link rel="manifest" href="manifest.json" />

<link rel="stylesheet" href="style.css" />
</head>
<body>

<div id="login-view" class="view">
  <h1>要吃什麼</h1>
  <form id="login-form">
    <input type="email" id="login-email" placeholder="Email" required autocomplete="username" />
    <input type="password" id="login-password" placeholder="密碼" required autocomplete="current-password" />
    <button type="submit">登入</button>
    <p id="login-error" class="error"></p>
  </form>
</div>

<div id="app-view" class="view hidden">
  <header>
    <h1>要吃什麼</h1>
    <button id="logout-btn">登出</button>
  </header>

  <nav id="tabs">
    <button class="tab-btn active" data-tab="tier">排序</button>
    <button class="tab-btn" data-tab="add">新增餐廳</button>
    <button class="tab-btn" data-tab="history">歷史紀錄</button>
  </nav>

  <section id="tier-panel" class="panel">
    <div id="tier-list"></div>
  </section>

  <section id="add-panel" class="panel hidden">
    <form id="add-form">
      <label>餐廳名稱
        <input type="text" id="add-name" required />
      </label>
      <label>標籤（用逗號分隔，選填）
        <input type="text" id="add-tags" placeholder="日式, 消夜" />
      </label>
      <label>偏好分數（1～5）
        <input type="number" id="add-preference" min="1" max="5" value="3" />
      </label>
      <label>冷卻天數（幾天內不重複排進來）
        <input type="number" id="add-cooldown" min="0" value="0" />
      </label>
      <button type="submit">新增</button>
    </form>
  </section>

  <section id="history-panel" class="panel hidden">
    <ul id="history-list"></ul>
  </section>
</div>

<script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
<script type="module" src="app.js"></script>
</body>
</html>
